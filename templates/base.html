<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Context — News, explained{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <nav class="top-nav">
      <a class="wordmark" href="{{ url_for('home') }}">
        <span class="wordmark-badge">C</span>
        <span class="wordmark-text">Context</span>
      </a>
      <div class="nav-links">
        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
        <a class="nav-link" href="{{ url_for('about') }}">About us</a>
        <div class="menu-dropdown" id="menu-dropdown">
          <button
            class="hamburger-btn"
            id="hamburger-btn"
            aria-label="Browse categories"
            aria-expanded="false"
          >
            <span></span><span></span><span></span>
          </button>
          <div class="dropdown-panel" id="dropdown-panel">
            <a
              class="dropdown-item"
              href="{{ url_for('category_page', name='tech') }}"
              >Tech</a
            >
            <a
              class="dropdown-item"
              href="{{ url_for('category_page', name='finance') }}"
              >Finance</a
            >
            <a
              class="dropdown-item"
              href="{{ url_for('category_page', name='sports') }}"
              >Sports</a
            >
            <a
              class="dropdown-item"
              href="{{ url_for('category_page', name='politics') }}"
              >Politics</a
            >
            <a
              class="dropdown-item"
              href="{{ url_for('category_page', name='science') }}"
              >Science</a
            >
            <a
              class="dropdown-item"
              href="{{ url_for('category_page', name='daily-rituals') }}"
              >Daily Rituals</a
            >
          </div>
        </div>
      </div>
    </nav>

    <script src="{{ url_for('static', filename='js/nav.js') }}"></script>

    <main>{% block content %}{% endblock %}</main>

    {% block scripts %}{% endblock %}
  </body>
</html>
