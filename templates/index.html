{% extends "base.html" %} {% block content %}
<div class="home-page">
  <div class="masthead">
    <h1 class="masthead-title">News, in context.</h1>
    <p class="masthead-sub">
      Ask about any story. Get a clear explainer with the angles that matter —
      and the sources behind them.
    </p>
  </div>

  <form class="search-bar" id="search-form">
    <svg
      class="search-icon"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input
      class="search-input"
      id="search-input"
      placeholder="What's happening? Ask about any news."
      autocomplete="off"
    />
    <button type="submit" class="search-submit" id="search-submit">
      Explain
    </button>
  </form>

  <section class="carousel-section">
    <h2 class="section-title">Trending Today</h2>
    <div class="carousel-wrap">
      <button
        class="scroll-arrow left"
        data-target="trending-track"
        aria-label="Scroll left"
      >
        ‹
      </button>
      <div class="carousel-track" id="trending-track"></div>
      <button
        class="scroll-arrow right"
        data-target="trending-track"
        aria-label="Scroll right"
      >
        ›
      </button>
    </div>
  </section>

  <section class="carousel-section">
    <h2 class="section-title">India</h2>
    <div class="carousel-wrap">
      <button
        class="scroll-arrow left"
        data-target="india-track"
        aria-label="Scroll left"
      >
        ‹
      </button>
      <div class="carousel-track" id="india-track"></div>
      <button
        class="scroll-arrow right"
        data-target="india-track"
        aria-label="Scroll right"
      >
        ›
      </button>
    </div>
  </section>

  <section class="carousel-section">
    <h2 class="section-title">International</h2>
    <div class="carousel-wrap">
      <button
        class="scroll-arrow left"
        data-target="intl-track"
        aria-label="Scroll left"
      >
        ‹
      </button>
      <div class="carousel-track" id="intl-track"></div>
      <button
        class="scroll-arrow right"
        data-target="intl-track"
        aria-label="Scroll right"
      >
        ›
      </button>
    </div>
  </section>
</div>
{% endblock %} {% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/render.js') }}"></script>
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
